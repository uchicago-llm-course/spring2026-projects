[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "hybrid-bo"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn>=1.4",
    "scipy>=1.12",
    "POT>=0.9",
    "numpy>=1.26",
    "pandas>=2.2",
    "matplotlib>=3.8",
    "openai>=1.20",
    "gurobipy",
    "modal",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-mock", "ruff"]

[tool.setuptools.packages.find]
where = ["src"]